name: publish-pages

# Publishes data/viff-series.json via GitHub Pages on every push
# to main. The actual scraping happens in the private repo
# woodthu/marquee-data-private; this workflow only handles the
# public re-deploy of the JSON.

on:
  push:
    branches: [main]
    paths: [data/**]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage Pages site
        run: |
          mkdir -p _site
          cp data/viff-series.json _site/viff-series.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
