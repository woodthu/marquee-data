name: publish-pages

# Publishes every JSON under data/ via GitHub Pages on push to main.
# The actual scraping happens in the private repo
# woodthu/marquee-data-private; this workflow only handles the
# public re-deploy of the JSON.

on:
  push:
    branches: [main]
    paths: [data/**]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time, and let a newer run CANCEL an older
# queued/in-progress one. GitHub Pages allows a single active deployment per
# environment, so with cancel-in-progress:false two runs stacked close together
# (e.g. a data push plus a manual re-run) fight over the environment and the
# superseded one reports "Deployment failed, try again later." Cancelling the
# stale run instead is GitHub's recommended setting for Pages and clears those
# spurious failures. The site content is unaffected either way — the newest
# run always wins — this just stops the loser from reporting a red X.
concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage Pages site
        run: |
          mkdir -p _site
          # Copy every JSON in data/ to the Pages root so adding a new
          # data file only requires committing it under data/ — no
          # workflow edit. Existing iOS fetchers expect root-level
          # URLs (e.g. /viff-series.json, /programme-guides.json), so
          # the flattening matters.
          cp data/*.json _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
